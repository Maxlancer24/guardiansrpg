 });
 document.querySelectorAll(".nav a").forEach(function(a){
  a.classList.toggle("is-on",a.dataset.p===id);
 });
 if(id==="combat"&&!built.combat){built.combat=1;initCalc();}
 if(id==="valestia"&&!built.map){built.map=1;initMap();}
 if(id==="lab"&&!built.lab){built.lab=1;initLab();}
 closeRail();
 window.scrollTo(0,0);
}
addEventListener("hashchange",route);

/* ══════════════════════════════════════════════════════════════════
   CALCULATOR
   ══════════════════════════════════════════════════════════════════ */
function initCalc(){
 var S={lvl:20,str:10,agi:9,con:10};
 var DEF=[["str","STR","Damage per hit, and the spine of your parry"],
          ["agi","AGI","Damage multiplier, crit, dodge, flat reduction"],
          ["con","CON","Max HP, rest healing, block and counter"]];
 var budget=function(){return 10+(S.lvl-1);}, spent=function(){return S.str+S.agi+S.con;};
 function crit(a){return a<=10?a:10+Math.floor((a-10)/3);}
 function oc(a){return 1+0.5*(a/29);}
 var sEl=document.getElementById("stats");
 sEl.innerHTML=DEF.map(function(d){
  return '<div class="st"><div class="st__t"><span class="st__k">'+d[1]+'</span><span class="st__d">'+d[2]+'</span>'+
   '<span class="st__v num" data-v="'+d[0]+'">0</span></div><div class="st__r">'+
   '<button class="btn" data-dec="'+d[0]+'" aria-label="Lower '+d[1]+'">−</button>'+
   '<span class="mtr"><span class="mtr__f" data-m="'+d[0]+'"></span></span>'+
   '<button class="btn" data-inc="'+d[0]+'" aria-label="Raise '+d[1]+'">+</button></div></div>';
 }).join("");
 var TL=[["hp","Max HP","50 + CON×15",1],["rest","Rest heals","20 + CON×3"],["crit","Crit / Dodge","from AGI"],
         ["red","Flat reduction","AGI × 2.5"],["blk","Parry block","CON×5 + STR"],["ctr","Parry counter","CON×3 + STR"]];
 document.getElementById("ro").innerHTML=TL.map(function(t){
  return '<div class="tl"><span class="tl__k">'+t[1]+'</span><span class="tl__v num'+(t[3]?" br":"")+'" data-t="'+t[0]+'">—</span><span class="tl__f">'+t[2]+"</span></div>";
 }).join("");
 function verdict(){
  var a=S.agi,c=S.con,s=S.str,tot=spent()||1,left=budget()-spent();
  if(left>0) return "You have <strong>"+left+"</strong> unspent point"+(left>1?"s":"")+".";
  if(c/tot>=.5) return "A parry tank. You block <strong>"+(c*5+s)+"</strong> and counter for <strong>"+(c*3+s)+"</strong> — and Ultra Focus walks straight through all of it.";
  if(a/tot>=.45) return "A dodge build. <strong>"+crit(a)+"%</strong> to avoid the hit outright and <strong>"+(a*2.5)+"</strong> off whatever lands.";
  if(s/tot>=.5) return "A hitter. <strong>"+Math.round((s*4+10)*oc(a))+"</strong> on an average swing, <strong>"+Math.round((s*4+10)*oc(a)*2)+"</strong> with Focus. A tank who rests will bury you.";
  return "Balanced. <strong>"+(50+c*15)+"</strong> HP, <strong>"+crit(a)+"%</strong> crit, no glaring hole — and nothing that scares anyone.";
 }
 function render(){
  var b=budget(),sp=spent();
  document.getElementById("lvV").textContent=S.lvl;
  var bd=document.getElementById("bud"); bd.textContent=sp+" / "+b; bd.classList.toggle("over",sp>b);
  DEF.forEach(function(d){
   document.querySelector('[data-v="'+d[0]+'"]').textContent=S[d[0]];
   document.querySelector('[data-m="'+d[0]+'"]').style.width=Math.min(100,(S[d[0]]/40)*100)+"%";
   document.querySelector('[data-inc="'+d[0]+'"]').disabled=(sp>=b);
   document.querySelector('[data-dec="'+d[0]+'"]').disabled=(S[d[0]]<=0);
  });
  document.getElementById("lvD").disabled=(S.lvl<=1);
  var set={hp:50+S.con*15,rest:20+S.con*3,crit:crit(S.agi)+"%",red:S.agi*2.5,blk:S.con*5+S.str,ctr:S.con*3+S.str};
  Object.keys(set).forEach(function(k){document.querySelector('[data-t="'+k+'"]').textContent=set[k];});
  var m=oc(S.agi), lo=Math.round((S.str*4+5)*m), hi=Math.round((S.str*4+15)*m), sc=Math.max(1,hi*2);
  function bar(si,ni,l,h,col){
   var e=document.getElementById(si);
   e.style.left=(l/sc*100)+"%"; e.style.width=Math.max(1.5,(h-l)/sc*100)+"%"; e.style.background=col;
   document.getElementById(ni).textContent=l+"–"+h;
  }
  bar("sN","nN",lo,hi,"var(--verdigris)");
  bar("sC","nC",Math.round(lo*1.5),Math.round(hi*1.5),"var(--brass)");
  bar("sF","nF",lo*2,hi*2,"var(--corrupt)");
  document.getElementById("vd").innerHTML=verdict();
 }
 document.getElementById("lvU").addEventListener("click",function(){if(S.lvl<70){S.lvl++;render();}});
 document.getElementById("lvD").addEventListener("click",function(){if(S.lvl>1){S.lvl--;render();}});
 sEl.addEventListener("click",function(e){
  var i=e.target.closest("[data-inc]"), d=e.target.closest("[data-dec]");
  if(i&&spent()<budget()){S[i.dataset.inc]++;render();}
  if(d&&S[d.dataset.dec]>0){S[d.dataset.dec]--;render();}
 });
 render();
}

/* ══════════════════════════════════════════════════════════════════
   PET LAB — the same formulas pet_data.stats_at_level / default_moves run
   ══════════════════════════════════════════════════════════════════ */
function initLab(){
 /* PET_DB.S rows: [id,name,emoji,type,region,role,stage,hp,atk,def,spd,evolves_to,learnset] */
 var S={}, byLine={}, MV={};
 PET_DB.S.forEach(function(r){
  S[r[0]]={id:r[0],name:r[1],emoji:r[2],type:r[3],region:r[4],role:r[5],stage:r[6],
           base:{hp:r[7],atk:r[8],def:r[9],spd:r[10]},evo:r[11],learn:r[12]};
 });
 PET_DB.M.forEach(function(m){
  MV[m[0]]={id:m[0],name:m[1],type:m[2],power:m[3],acc:m[4],pp:m[5],pri:m[6],eff:m[7]};
 });
 /* rebuild each family chain by walking evolves_to from every stage-1 */
 Object.keys(S).forEach(function(k){
  var s=S[k]; if(s.stage!==1) return;
  var chain=[k], cur=s;
  while(cur.evo && S[cur.evo]){ chain.push(cur.evo); cur=S[cur.evo]; }
  chain.forEach(function(id){ byLine[id]=chain; });
 });

 var REG={starter_ruins:"Starter Ruins",crimson_plain:"Crimson Plain",stormbay_docks:"Stormbay Docks",
  rocky_chill_pass:"Rocky Chill Pass",black_lotus_wood:"Black Lotus Wood",ravencraft:"Ravencraft",
  mist_forest:"The Mist Forest",bandit_caves:"Bandit Caves",dark_knight_sanctum:"Dark Knight's Sanctum"};
 var TEMO={fire:"🔥",water:"💧",grass:"🌿",ice:"❄️",rock:"🪨",flying:"🦅",ghost:"👻",dark:"🌑",neutral:"⚪"};

 /* engine formulas, verbatim */
 function statsAt(id,lv,g){
  var b=S[id].base, o={};
  o.hp=Math.floor(b.hp*lv/50)+lv+10+(g.hp||0);
  ["atk","def","spd"].forEach(function(k){ o[k]=Math.floor(b[k]*lv/50)+5+(g[k]||0); });
  return o;
 }
 /* the last four distinct moves learned at or below `lv` */
 function movesAt(id,lv){
  var known=[];
  S[id].learn.forEach(function(p){ if(p[0]<=lv && known.indexOf(p[1])<0) known.push(p[1]); });
  return known.slice(-4);
 }
 /* which stage of the line you are at this level: evolves at 16 and 36 */
 function stageAt(line,lv){ return lv>=36?Math.min(2,line.length-1):(lv>=16?Math.min(1,line.length-1):0); }

 /* ceilings: strongest final-stage value per stat, for honest bar scaling */
 var CEIL={hp:0,atk:0,def:0,spd:0};
 Object.keys(S).forEach(function(k){
  if(S[k].stage!==3) return;
  var s=statsAt(k,50,{hp:15,atk:15,def:15,spd:15});
  ["hp","atk","def","spd"].forEach(function(x){ if(s[x]>CEIL[x]) CEIL[x]=s[x]; });
 });

 var st={sp:"cinderling",lv:50,g:{hp:15,atk:15,def:15,spd:15}};

 /* species picker, grouped by region */
 var sel=document.getElementById("labSp"), groups={};
 PET_DB.S.forEach(function(r){ (groups[r[4]]=groups[r[4]]||[]).push(r[0]); });
 sel.innerHTML=Object.keys(REG).map(function(rg){
  var list=(groups[rg]||[]).slice().sort(function(a,b){
   return S[a].stage-S[b].stage || S[a].name.localeCompare(S[b].name);
  });
  return '<optgroup label="'+E(REG[rg])+' · '+E(S[list[0]].type)+'">'+
   list.map(function(id){
    return '<option value="'+id+'">'+E(S[id].emoji+" "+S[id].name)+" — stage "+S[id].stage+"</option>";
   }).join("")+"</optgroup>";
 }).join("");
 sel.value=st.sp;

 /* gene sliders */
 var GK=[["hp","HP"],["atk","ATK"],["def","DEF"],["spd","SPD"]];
 document.getElementById("labGenes").innerHTML=
  '<div class="lab__l" style="margin-bottom:-.3rem">Genes <b class="num" id="labGT">60 / 60</b></div>'+
  GK.map(function(g){
   return '<div class="lab__f"><label class="lab__l" for="lg_'+g[0]+'">'+g[1]+
    ' gene <b class="num" data-gv="'+g[0]+'">15</b></label>'+
    '<input class="lab__rng" type="range" id="lg_'+g[0]+'" data-g="'+g[0]+'" min="0" max="15" value="15"></div>';
  }).join("");

 function quality(v){ return v<=4?"Poor":v<=8?"Average":v<=11?"Good":v<=13?"Excellent":"Exceptional"; }
 function totalQuality(t){ return t<=19?["Poor",1]:t<=31?["Average",2]:t<=43?["Good",3]:t<=52?["Excellent",4]:["Exceptional",5]; }

 function render(){
  var line=byLine[st.sp]||[st.sp];
  var id=line[stageAt(line,st.lv)];          /* auto-evolve with level */
  var s=S[id], cur=statsAt(id,st.lv,st.g), zero=statsAt(id,st.lv,{});

  document.getElementById("labLvV").textContent=st.lv;
  var tot=st.g.hp+st.g.atk+st.g.def+st.g.spd, tq=totalQuality(tot);
  document.getElementById("labGT").textContent=tot+" / 60";
  GK.forEach(function(g){ document.querySelector('[data-gv="'+g[0]+'"]').textContent=st.g[g[0]]; });

  document.getElementById("labId").innerHTML=
   '<span class="lab__emo">'+s.emoji+'</span><div><div class="lab__nm">'+E(s.name)+'</div>'+
   '<div class="lab__meta">'+E(REG[s.region])+' · stage '+s.stage+' of '+line.length+'</div></div>'+
   '<div class="lab__badges"><span class="lab__bd lab__bd--t">'+TEMO[s.type]+" "+E(s.type)+'</span>'+
   '<span class="lab__bd">'+E(s.role)+'</span></div>';

  document.getElementById("labStats").innerHTML=GK.map(function(g){
   var k=g[0], v=cur[k], z=zero[k], d=v-z;
   return '<div class="sb" style="grid-column:span 2"><div class="sb__t"><span class="sb__k">'+g[1]+'</span>'+
    '<span class="sb__v num">'+v+'</span>'+(d>0?'<span class="sb__d">+'+d+' from genes</span>':'')+'</div>'+
    '<div class="sb__bar"><span class="sb__ghost" style="width:'+Math.min(100,z/CEIL[k]*100)+'%"></span>'+
    '<span class="sb__fill" style="width:'+Math.min(100,v/CEIL[k]*100)+'%"></span></div></div>';
  }).join("");

  document.getElementById("labChain").innerHTML=line.map(function(x,i){
   var at=[1,16,36][i];
   return (i?'<span class="ev__ar">→</span>':'')+
    '<span class="ev'+(x===id?" on":"")+'">'+S[x].emoji+" "+E(S[x].name)+
    (i?' <b>lv'+at+'</b>':'')+"</span>";
  }).join("");

  var mv=movesAt(id,st.lv);
  document.getElementById("labMoves").innerHTML=mv.map(function(m){
   var M=MV[m], stab=(M.type===s.type);
   return '<div class="mv'+(stab?" mv--stab":"")+'"><div class="mv__h"><span class="mv__n">'+E(M.name)+'</span>'+
    '<span class="mv__t">'+(TEMO[M.type]||"")+" "+E(M.type)+'</span></div>'+
    '<div class="mv__s">'+(M.power?"pow "+M.power:"status")+" · acc "+(M.acc>100?"—":M.acc)+" · "+M.pp+" PP"+
    (M.pri?" · priority +"+M.pri:"")+(stab?" · STAB ×1.5":"")+'</div>'+
    (M.eff?'<div class="mv__e">'+E(M.eff)+"</div>":"")+"</div>";
  }).join("");

  var next=null;
  S[id].learn.forEach(function(p){ if(p[0]>st.lv && next===null) next=p; });
  document.getElementById("labNote").innerHTML=
   (PET_DB.D[id]?"<em>"+E(PET_DB.D[id])+"</em><br>":"")+
   (next?"Next move at level <strong>"+next[0]+"</strong>: "+E(MV[next[1]].name)+". ":"")+
   (mv.length<4?"Only "+mv.length+" move"+(mv.length>1?"s":"")+" known — it fills to 4 as it levels.":"");

  document.getElementById("labQ").innerHTML=
   "Gene total <strong>"+tot+"/60</strong> — <strong>"+tq[0]+"</strong>. Releasing this Pet would pay <strong>"+
   tq[1]+"</strong> Gene Essence."+(tot===60?" A perfect roll; you will not see many.":"");
 }

 sel.addEventListener("change",function(){ st.sp=sel.value; render(); });
 document.getElementById("labLv").addEventListener("input",function(e){ st.lv=+e.target.value; render(); });
 document.getElementById("labGenes").addEventListener("input",function(e){
  var g=e.target.dataset.g; if(!g) return;
  st.g[g]=+e.target.value; render();
 });
 function setGenes(fn){
  GK.forEach(function(g){
   st.g[g[0]]=fn();
   document.getElementById("lg_"+g[0]).value=st.g[g[0]];
  });
  render();
 }
 document.getElementById("labPerfect").addEventListener("click",function(){ setGenes(function(){return 15;}); });
 document.getElementById("labZero").addEventListener("click",function(){ setGenes(function(){return 0;}); });
 document.getElementById("labRoll").addEventListener("click",function(){
  setGenes(function(){ return Math.floor(Math.random()*16); });
 });
 render();
}

/* ══════════════════════════════════════════════════════════════════
   MAP OF VALESTIA
   ══════════════════════════════════════════════════════════════════ */
function initMap(){
 /* The painted map is the real artwork; markers are positioned over it in
    percentages, so they track the image at every width. */
 var s='<div class="mapwrap"><img class="mapimg" src="'+MAP_SRC+'" alt="Map of Valestia" width="1485" height="810" loading="lazy" decoding="async">';
 Object.keys(PLACES).forEach(function(id){
  var p=PLACES[id]; if(p.t==="geo") return;
  s+='<button class="pin '+(p.t==="hunt"?"hunt":"")+(p.t==="seal"?" seal":"")+'" data-n="'+id+'"'+
     ' style="left:'+p.x+'%;top:'+p.y+'%" aria-label="'+E(p.n)+'"><span class="pin__d"></span>'+
     '<span class="pin__t">'+E(p.n)+'</span></button>';
 });
 s+="</div>";
 document.getElementById("map").innerHTML=s;

 var dos=document.getElementById("dos");
 function sel(id){
  var p=PLACES[id];
  document.querySelectorAll(".pin").forEach(function(n){n.classList.toggle("on",n.dataset.n===id);});
  var kind={hunt:"Huntable region",story:"Story location",side:"Side story",seal:"Seal site",portal:"Portal region"}[p.t]||"Location";
  var h='<p class="dos__e">'+kind.toUpperCase()+'</p><h3>'+E(p.n)+"</h3>";
  h+='<div class="dos__r"><p class="dos__x">'+E(p.d)+"</p></div>";
  if(p.m){
   h+='<div class="dos__r"><p class="dos__k">Signature material</p><p class="dos__m">'+E(p.m)+'</p>'+
      '<p class="dos__x" style="margin-top:.3rem">Only drops here. Feeds this region\'s gear and one weapon recipe.</p></div>';
  }
  if(FAUNA[id]){
   h+='<div class="dos__r"><p class="dos__k">Species — tier 1 → 7</p>';
   FAUNA[id].forEach(function(f){
    h+='<p class="sp"><span class="sp__a">'+f[0]+'</span><span class="sp__n"><b>'+E(f[1])+"</b> → <b>"+E(f[2])+"</b></span></p>";
   });
   h+="</div>";
  }
  var links=ROADS.filter(function(r){return r[0]===id||r[1]===id;})
    .map(function(r){var o=r[0]===id?r[1]:r[0];return PLACES[o]?PLACES[o].n:null;}).filter(Boolean);
  if(links.length) h+='<div class="dos__r"><p class="dos__k">Connects to</p><p class="dos__x">'+links.join(" · ")+"</p></div>";
  dos.innerHTML=h;
 }
 /* <button> already fires on Enter/Space, so click alone covers the keyboard */
 document.getElementById("map").addEventListener("click",function(e){
  var n=e.target.closest("[data-n]"); if(n) sel(n.dataset.n);
 });
 sel("stormbay");
}

route();
})();
</script>
