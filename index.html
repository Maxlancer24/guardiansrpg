<style>
*,*::before,*::after{box-sizing:border-box}
html{-moz-text-size-adjust:none;-webkit-text-size-adjust:none;text-size-adjust:none}
body,h1,h2,h3,h4,p,figure,blockquote,dl,dd{margin:0}
ul[role='list'],ol[role='list']{list-style:none}
img,picture,svg,video,canvas{max-width:100%;display:block}
input,button,textarea,select{font:inherit}
table{border-collapse:collapse}

:root{
  --bg:#D5D8D1; --bg-raised:#DEE0DA; --bg-sunken:#C7CBC3; --bg-rail:#CDD1C9;
  --rule:rgba(20,45,40,.18); --rule-strong:rgba(20,45,40,.38);
  --graticule:rgba(47,97,83,.09);
  --text:#16211F; --text-dim:#455249; --text-faint:#6B7A73;
  --brass:#8A6522; --brass-soft:rgba(138,101,34,.13);
  --verdigris:#2F6153; --verdigris-soft:rgba(47,97,83,.10);
  --corrupt:#8C3A32; --corrupt-soft:rgba(140,58,50,.11);
  --sea:#9DAAA6; --sea-deep:#7C8C88; --land:#CFD3CB; --void:#0A1416;
  --serif:'Newsreader',Georgia,'Times New Roman',serif;
  --cond:'Barlow Condensed','Arial Narrow',Arial,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,Consolas,monospace;
  --rail:266px;
  --ease:cubic-bezier(.2,.7,.3,1);
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#0A1416; --bg-raised:#111E20; --bg-sunken:#060D0E; --bg-rail:#0C181A;
    --rule:rgba(160,195,186,.15); --rule-strong:rgba(160,195,186,.32);
    --graticule:rgba(120,185,168,.06);
    --text:#DCE3DF; --text-dim:#93A49E; --text-faint:#65766F;
    --brass:#C79A4B; --brass-soft:rgba(199,154,75,.14);
    --verdigris:#4E9584; --verdigris-soft:rgba(78,149,132,.12);
    --corrupt:#B4544A; --corrupt-soft:rgba(180,84,74,.14);
    --sea:#12262A; --sea-deep:#0B191C; --land:#16282A; --void:#04090A;
  }
}
:root[data-theme="dark"]{
  --bg:#0A1416; --bg-raised:#111E20; --bg-sunken:#060D0E; --bg-rail:#0C181A;
  --rule:rgba(160,195,186,.15); --rule-strong:rgba(160,195,186,.32);
  --graticule:rgba(120,185,168,.06);
  --text:#DCE3DF; --text-dim:#93A49E; --text-faint:#65766F;
  --brass:#C79A4B; --brass-soft:rgba(199,154,75,.14);
  --verdigris:#4E9584; --verdigris-soft:rgba(78,149,132,.12);
  --corrupt:#B4544A; --corrupt-soft:rgba(180,84,74,.14);
  --sea:#12262A; --sea-deep:#0B191C; --land:#16282A; --void:#04090A;
}
:root[data-theme="light"]{
  --bg:#D5D8D1; --bg-raised:#DEE0DA; --bg-sunken:#C7CBC3; --bg-rail:#CDD1C9;
  --rule:rgba(20,45,40,.18); --rule-strong:rgba(20,45,40,.38);
  --graticule:rgba(47,97,83,.09);
  --text:#16211F; --text-dim:#455249; --text-faint:#6B7A73;
  --brass:#8A6522; --brass-soft:rgba(138,101,34,.13);
  --verdigris:#2F6153; --verdigris-soft:rgba(47,97,83,.10);
  --corrupt:#8C3A32; --corrupt-soft:rgba(140,58,50,.11);
  --sea:#9DAAA6; --sea-deep:#7C8C88; --land:#CFD3CB; --void:#0A1416;
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;background:var(--bg);color:var(--text);
  font-family:var(--cond);font-size:1rem;line-height:1.5;-webkit-font-smoothing:antialiased;
  background-image:linear-gradient(var(--graticule) 1px,transparent 1px),linear-gradient(90deg,var(--graticule) 1px,transparent 1px);
  background-size:64px 64px,64px 64px;
}
::selection{background:var(--brass);color:var(--bg)}
:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
h1,h2,h3,h4,p,ul,ol{margin:0}

/* ── SHELL ── */
.app{display:grid;grid-template-columns:var(--rail) minmax(0,1fr);min-height:100vh}
@media (max-width:940px){.app{grid-template-columns:1fr}}

.rail{
  background:var(--bg-rail);border-right:1px solid var(--rule);
  position:sticky;top:0;height:100vh;overflow-y:auto;padding:1.3rem 0 3rem;
}
@media (max-width:940px){
  .rail{position:fixed;inset:0 auto 0 0;width:min(84vw,300px);z-index:60;transform:translateX(-101%);transition:transform .26s var(--ease);border-right:1px solid var(--rule-strong)}
  .rail.is-open{transform:none}
}
.brand{display:block;padding:0 1.3rem 1.1rem;border-bottom:1px solid var(--rule);text-decoration:none}
.brand__w{font-family:var(--serif);font-weight:700;font-size:1.32rem;letter-spacing:-.01em;color:var(--text);line-height:1}
.brand__w em{font-style:italic;font-weight:400;color:var(--brass)}
.brand__s{font-family:var(--cond);font-weight:600;font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:var(--text-faint);margin-top:.4rem;display:block}

.navgrp{padding:1.15rem 0 .2rem}
.navgrp__t{font-family:var(--cond);font-weight:600;font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;color:var(--verdigris);padding:0 1.3rem .5rem}
.nav{display:flex;flex-direction:column}
.nav a{
  font-family:var(--cond);font-size:.95rem;color:var(--text-dim);text-decoration:none;
  padding:.34rem 1.3rem;border-left:2px solid transparent;transition:all .14s var(--ease);
  display:flex;align-items:baseline;gap:.5rem;
}
.nav a:hover{color:var(--text);background:var(--brass-soft)}
.nav a.is-on{color:var(--brass);border-left-color:var(--brass);background:var(--brass-soft)}
.nav a i{font-family:var(--mono);font-size:.6rem;font-style:normal;color:var(--text-faint);margin-left:auto}
.nav a.is-on i{color:var(--brass)}

.scrim{display:none}
@media (max-width:940px){
  .scrim{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55;opacity:0;pointer-events:none;transition:opacity .26s var(--ease)}
  .scrim.is-on{opacity:1;pointer-events:auto}
}
.burger{
  display:none;position:fixed;top:.7rem;left:.7rem;z-index:70;
  background:var(--bg-raised);border:1px solid var(--rule-strong);color:var(--text);
  font-family:var(--cond);font-weight:600;font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;
  padding:.5rem .8rem;cursor:pointer;
}
@media (max-width:940px){.burger{display:block}}

/* ── MAIN ── */
.main{min-width:0}
.page{display:none;padding:clamp(2rem,4vw,3.6rem) clamp(1.1rem,3.4vw,3.4rem) 6rem;max-width:1180px}
.page.is-on{display:block}
@media (max-width:940px){.page{padding-top:3.6rem}}

.ph{border-bottom:1px solid var(--rule);padding-bottom:1.5rem;margin-bottom:2.2rem}
.ph__e{font-family:var(--cond);font-weight:600;font-size:.68rem;letter-spacing:.24em;text-transform:uppercase;color:var(--verdigris)}
.ph h1{font-family:var(--serif);font-weight:600;font-size:clamp(1.9rem,3.6vw,2.9rem);line-height:1.04;letter-spacing:-.02em;margin:.5rem 0 0;text-wrap:balance}
.ph__d{font-family:var(--serif);font-size:1.04rem;color:var(--text-dim);margin-top:.85rem;max-width:64ch;line-height:1.6}

h2.s{font-family:var(--serif);font-weight:600;font-size:1.5rem;margin:2.8rem 0 .3rem;letter-spacing:-.01em;scroll-margin-top:1rem}
h2.s:first-of-type{margin-top:0}
h3.t{font-family:var(--cond);font-weight:600;font-size:.74rem;letter-spacing:.2em;text-transform:uppercase;color:var(--brass);margin:2rem 0 .8rem}
p.b{font-family:var(--serif);font-size:1.02rem;line-height:1.62;color:var(--text-dim);max-width:64ch;margin:.75rem 0}
p.b strong{color:var(--text);font-weight:600}
p.b em{font-style:italic}
.cmd{font-family:var(--mono);font-size:.84em;color:var(--brass);background:var(--brass-soft);padding:.08em .36em;white-space:nowrap}
.num{font-variant-numeric:tabular-nums}
.fx{font-family:var(--mono);font-size:.78rem;color:var(--verdigris);background:var(--verdigris-soft);padding:.6rem .75rem;margin:.85rem 0;display:block;overflow-x:auto;white-space:nowrap;max-width:64ch}

.callout{border-left:2px solid var(--brass);background:var(--brass-soft);padding:.85rem 1rem;margin:1.2rem 0;max-width:66ch}
.callout p{font-family:var(--serif);font-size:.96rem;line-height:1.55;color:var(--text-dim);margin:0}
.callout p+p{margin-top:.5rem}
.callout--warn{border-left-color:var(--corrupt);background:var(--corrupt-soft)}

/* ── TABLE ── */
.tw{overflow-x:auto;border:1px solid var(--rule);margin:1rem 0}
table{border-collapse:collapse;width:100%;min-width:440px}
th{
  font-family:var(--cond);font-weight:600;font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--text-faint);text-align:left;padding:.6rem .8rem;background:var(--bg-raised);
  border-bottom:1px solid var(--rule-strong);white-space:nowrap;
}
td{
  font-family:var(--cond);font-size:.92rem;color:var(--text-dim);padding:.52rem .8rem;
  border-bottom:1px solid var(--rule);vertical-align:top;
}
tr:last-child td{border-bottom:0}
td.k{font-family:var(--serif);font-weight:600;color:var(--text);white-space:nowrap}
td.n{font-family:var(--mono);font-size:.82rem;font-variant-numeric:tabular-nums;color:var(--brass);white-space:nowrap}
td.m{font-family:var(--mono);font-size:.76rem;color:var(--text-faint)}
tbody tr:hover td{background:var(--brass-soft)}

/* ── CARD GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(258px,1fr));gap:1px;background:var(--rule);border:1px solid var(--rule);margin:1rem 0}
.grid--wide{grid-template-columns:repeat(auto-fit,minmax(330px,1fr))}
.card{background:var(--bg);padding:1.15rem 1.1rem}
.card__h{display:flex;align-items:baseline;gap:.5rem;margin-bottom:.45rem}
.card__n{font-family:var(--serif);font-weight:600;font-size:1.04rem;color:var(--text)}
.card__tag{font-family:var(--mono);font-size:.6rem;letter-spacing:.06em;color:var(--brass);border:1px solid var(--brass);padding:.05rem .3rem;margin-left:auto;white-space:nowrap}
.card__tag--clan{color:var(--corrupt);border-color:var(--corrupt)}
.card__st{font-family:var(--mono);font-size:.72rem;color:var(--verdigris);margin-bottom:.4rem}
.card__d{font-family:var(--cond);font-size:.9rem;color:var(--text-dim);line-height:1.5}
.card__f{font-family:var(--mono);font-size:.66rem;color:var(--text-faint);margin-top:.55rem;padding-top:.5rem;border-top:1px solid var(--rule)}

/* ── CALCULATOR ── */
.rig{display:grid;grid-template-columns:minmax(0,320px) minmax(0,1fr);gap:1px;background:var(--rule);border:1px solid var(--rule);margin:1.2rem 0}
@media (max-width:820px){.rig{grid-template-columns:1fr}}
.rig__p{background:var(--bg-raised);padding:1.4rem 1.2rem}
.rig__o{background:var(--bg);padding:1.4rem 1.2rem}
.lvl{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding-bottom:1rem;border-bottom:1px solid var(--rule)}
.lvl__l{font-family:var(--cond);font-weight:600;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-faint)}
.lvl__c{display:flex;align-items:center;gap:.45rem}
.btn{font-family:var(--mono);font-size:.88rem;line-height:1;background:transparent;color:var(--text);border:1px solid var(--rule-strong);width:25px;height:25px;cursor:pointer;display:grid;place-items:center;padding:0;transition:all .14s var(--ease)}
.btn:hover:not(:disabled){border-color:var(--brass);color:var(--brass)}
.btn:disabled{opacity:.25;cursor:not-allowed}
.lvl__v{font-family:var(--mono);font-size:1rem;color:var(--brass);min-width:2.2ch;text-align:center;font-variant-numeric:tabular-nums}
.bud{display:flex;justify-content:space-between;align-items:baseline;padding:.9rem 0 .2rem}
.bud__t{font-family:var(--cond);font-weight:600;font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-faint)}
.bud__v{font-family:var(--mono);font-size:.84rem;font-variant-numeric:tabular-nums}
.bud__v.over{color:var(--corrupt)}
.st{padding:.85rem 0;border-top:1px solid var(--rule)}
.st__t{display:flex;align-items:center;gap:.6rem;margin-bottom:.45rem}
.st__k{font-family:var(--cond);font-weight:600;font-size:.9rem;letter-spacing:.14em;text-transform:uppercase;width:3.4ch}
.st__d{font-family:var(--cond);font-size:.8rem;color:var(--text-faint);margin-right:auto;line-height:1.25}
.st__v{font-family:var(--mono);font-size:.95rem;color:var(--brass);min-width:2.4ch;text-align:right;font-variant-numeric:tabular-nums}
.st__r{display:flex;align-items:center;gap:.5rem}
.mtr{flex:1;height:5px;background:var(--bg-sunken);border:1px solid var(--rule);position:relative;overflow:hidden}
.mtr__f{position:absolute;inset:0 auto 0 0;background:var(--brass);transition:width .2s var(--ease)}
.ro{display:grid;grid-template-columns:repeat(auto-fit,minmax(138px,1fr));gap:1px;background:var(--rule);border:1px solid var(--rule);margin-bottom:1.2rem}
.tl{background:var(--bg-raised);padding:.75rem .8rem;display:flex;flex-direction:column;gap:.22rem}
.tl__k{font-family:var(--cond);font-weight:600;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint)}
.tl__v{font-family:var(--mono);font-size:1.2rem;color:var(--text);font-variant-numeric:tabular-nums;line-height:1.1}
.tl__v.br{color:var(--brass)}
.tl__f{font-family:var(--mono);font-size:.6rem;color:var(--text-faint)}
.dm{border:1px solid var(--rule);margin-bottom:1.1rem}
.dm__h{font-family:var(--cond);font-weight:600;font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-faint);padding:.6rem .8rem;border-bottom:1px solid var(--rule);background:var(--bg-raised)}
.dm__r{display:flex;align-items:center;gap:.8rem;padding:.55rem .8rem;border-bottom:1px solid var(--rule)}
.dm__r:last-child{border-bottom:0}
.dm__l{font-family:var(--cond);font-size:.86rem;color:var(--text-dim);width:10ch;flex-shrink:0}
.dm__b{flex:1;height:13px;background:var(--bg-sunken);border:1px solid var(--rule);position:relative;overflow:hidden;min-width:34px}
.dm__s{position:absolute;top:0;bottom:0;transition:all .2s var(--ease)}
.dm__n{font-family:var(--mono);font-size:.8rem;width:9ch;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.vd{font-family:var(--serif);font-size:.92rem;color:var(--text-faint);line-height:1.5;border-left:2px solid var(--verdigris);padding-left:.75rem}

/* ── MAP ── */
.atlas{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,290px);gap:1px;background:var(--rule);border:1px solid var(--rule);margin:1.2rem 0}
@media (max-width:940px){.atlas{grid-template-columns:1fr}}
.atlas__m{background:var(--sea-deep);position:relative;overflow:hidden}
.mapwrap{position:relative;line-height:0}
.mapimg{width:100%;height:auto;display:block}
/* markers sit over the painted map in % so they track it at any width */
.pin{
  position:absolute;transform:translate(-50%,-50%);background:none;border:0;padding:10px;
  cursor:pointer;line-height:0;z-index:2;
}
.pin__d{
  display:block;width:11px;height:11px;border-radius:50%;
  background:transparent;border:2px solid var(--verdigris);
  box-shadow:0 0 0 2px rgba(0,0,0,.45);transition:all .16s var(--ease);
}
.pin.hunt .pin__d{background:var(--verdigris)}
.pin.seal .pin__d{border-style:dashed;border-color:var(--corrupt)}
.pin:hover .pin__d{border-color:var(--brass);background:var(--brass);transform:scale(1.35)}
.pin.on .pin__d{background:var(--brass);border-color:var(--brass);transform:scale(1.5);box-shadow:0 0 0 3px rgba(0,0,0,.5),0 0 14px 3px var(--brass)}
.pin__t{
  position:absolute;left:50%;top:-6px;transform:translate(-50%,-100%);
  font-family:var(--cond);font-weight:600;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;
  white-space:nowrap;color:#F2EDE2;background:rgba(6,14,15,.92);border:1px solid var(--brass);
  padding:.16rem .4rem;line-height:1.3;opacity:0;pointer-events:none;transition:opacity .16s var(--ease);
}
.pin:hover .pin__t,.pin:focus-visible .pin__t,.pin.on .pin__t{opacity:1}
.atlas__s{background:var(--bg-raised);padding:1.3rem 1.2rem}
.leg{display:flex;flex-wrap:wrap;gap:1rem;padding:.7rem .9rem;border-top:1px solid var(--rule);background:var(--bg-raised)}
.leg span{font-family:var(--cond);font-size:.74rem;color:var(--text-faint);display:flex;align-items:center;gap:.35rem}
.leg b{width:8px;height:8px;border-radius:50%;display:inline-block}
.dos__e{font-family:var(--mono);font-size:.64rem;color:var(--brass)}
.dos h3{font-family:var(--serif);font-weight:600;font-size:1.3rem;margin:.2rem 0 0;line-height:1.15}
.dos__r{border-top:1px solid var(--rule);padding-top:.65rem;margin-top:.85rem}
.dos__k{font-family:var(--cond);font-weight:600;font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-faint);margin-bottom:.3rem}
.dos__m{font-family:var(--mono);font-size:.82rem;color:var(--brass)}
.dos__x{font-family:var(--cond);font-size:.88rem;color:var(--text-dim);line-height:1.45}
.sp{margin-bottom:.45rem;font-family:var(--cond);font-size:.86rem;line-height:1.35}
.sp__a{font-family:var(--mono);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--verdigris);display:block}
.sp__n{color:var(--text-dim)}
.sp__n b{color:var(--text);font-weight:400}

/* ── PET LAB ── */
.lab{display:grid;grid-template-columns:minmax(0,300px) minmax(0,1fr);gap:1px;background:var(--rule);border:1px solid var(--rule);margin:1.2rem 0}
@media (max-width:820px){.lab{grid-template-columns:1fr}}
.lab__ctl{background:var(--bg-raised);padding:1.3rem 1.2rem;display:flex;flex-direction:column;gap:1rem}
.lab__out{background:var(--bg);padding:1.3rem 1.2rem}
.lab__f{display:flex;flex-direction:column;gap:.4rem}
.lab__l{font-family:var(--cond);font-weight:600;font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-faint);display:flex;justify-content:space-between}
.lab__l b{color:var(--brass);font-family:var(--mono);letter-spacing:0}
.lab__sel{font-family:var(--cond);font-size:.94rem;background:var(--bg);color:var(--text);border:1px solid var(--rule-strong);padding:.45rem .5rem;width:100%}
.lab__rng{width:100%;accent-color:var(--brass);height:20px}
.lab__genes{display:flex;flex-direction:column;gap:.7rem;border-top:1px solid var(--rule);padding-top:1rem}
.lab__btns{display:flex;flex-wrap:wrap;gap:.4rem}
.lab__b{font-family:var(--cond);font-weight:600;font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;background:transparent;color:var(--text-dim);border:1px solid var(--rule-strong);padding:.36rem .6rem;cursor:pointer;transition:all .14s var(--ease)}
.lab__b:hover{border-color:var(--brass);color:var(--brass)}
.lab__q{font-family:var(--serif);font-size:.88rem;color:var(--text-faint);line-height:1.5;border-left:2px solid var(--verdigris);padding-left:.7rem;margin:0}

function tbl(head,rows,cls){
  var h='<div class="tw"><table><thead><tr>'+head.map(function(x){return "<th>"+E(x)+"</th>";}).join("")+"</tr></thead><tbody>";
  h+=rows.map(function(r){
    return "<tr>"+r.map(function(c,i){return '<td class="'+((cls&&cls[i])||"")+'">'+c+"</td>";}).join("")+"</tr>";
  }).join("");
  return h+"</tbody></table></div>";
}

var PAGES={};

PAGES.start={t:"Getting Started",e:"The guide",d:"There is no registration. Your account is created the first time you make a profile from the Kiosk, or the first time you join a game — whichever happens first.",h:function(){
 return '<div class="callout"><p><strong>The Guardians</strong> is a Discord RPG built and run by <strong>Max</strong> — the combat engine, the world of Valestia, the 81 story and side missions, all of it.</p>'+
 '<p>Everything on this site describes the bot as it actually runs on <strong>the server the bot lives in</strong>. Reward amounts, drop rates, daily caps, prices and which panels are up are set by Max, and the defaults listed here are what he starts from.</p></div>'+
 '<h2 class="s">The Kiosk</h2>'+
 '<p class="b">The bot uses the <span class="cmd">!</span> prefix for typed commands, but most of the game is <strong>panel-driven</strong>: Max places persistent button panels in the channels and you play by clicking them. The most important one is the <strong>Kiosk</strong> — your personal hub.</p>'+
 tbl(["Kiosk button","What it does"],[
  ["Create / Edit Profile","Creates your account and sets your starting build"],
  ["My Stats","Your live stats, including every gear bonus"],
  ["My Bag","Your potions and consumables"],
  ["Stat Slots","Save and switch between up to 3 builds"],
  ["Gear Slots","Equip crafted gear into your 2 gear slots"],
  ["Codex","Your collection of cards — enemies, gear, regions, allies"],
  ["Link Chainers Wallet","Connects an external wallet for redeemable rewards"]
 ],["k",""])+
 '<h2 class="s">Your first hour</h2>'+
 '<p class="b"><strong>1 — Make a profile.</strong> Open the Kiosk, create your character, and spend your points. You start with 10.</p>'+
 '<p class="b"><strong>2 — Set up two builds.</strong> It is free. Put an attacker in slot 1 and a tank in slot 2. Apply the right one before a fight.</p>'+
 '<p class="b"><strong>3 — Fight something.</strong> <span class="cmd">!duel @player</span> for a duel, <span class="cmd">!hunt</span> to farm a region, or whatever panel is up on the server.</p>'+
 '<p class="b"><strong>4 — Craft one starter piece.</strong> A Strength Ring or Cardboard Boots costs 4,000 OIL and changes every fight you take afterwards.</p>'+
 '<div class="callout"><p><strong>Open My Stats before any fight.</strong> It shows your build <em>after</em> gear and enhancement are applied. It is the only number that matters, and it is not the number in your stat slot.</p></div>'+
 '<h2 class="s">Commands worth knowing</h2>'+
 tbl(["Command","What it does"],[
  ['<span class="cmd">!profile</span> · <span class="cmd">!stats</span>',"Your level, XP, Oil Coins and gear"],
  ['<span class="cmd">!profile @user</span>',"Somebody else's profile"],
  ['<span class="cmd">!top20</span> · <span class="cmd">!top</span> · <span class="cmd">!top3</span>',"Server leaderboard"],
  ['<span class="cmd">!guilds</span> · <span class="cmd">!rep</span>',"Your faction reputation"],
  ['<span class="cmd">!clan</span>',"Clan info and management"],
  ['<span class="cmd">!bonds</span> · <span class="cmd">!bonds_top</span> · <span class="cmd">!bonds_history</span>',"Your relationships with other players"],
  ['<span class="cmd">!travel</span> · <span class="cmd">!hunt</span>',"Move between regions and farm materials"],
  ['<span class="cmd">!my_weapon</span> · <span class="cmd">!weapon_list</span>',"Your equipped weapon and the catalog"],
  ['<span class="cmd">!equip_weapon</span> · <span class="cmd">!unequip_weapon</span>',"Change your weapon"]
 ],["k",""])+
 '<h2 class="s">Stat slots and builds</h2>'+
 '<p class="b">You have <strong>3 stat slots</strong>. Each one stores a full build: a STR / AGI / CON spread <em>and</em> two gear pieces. Gear stacks on top of the slot — a slot with STR 8 plus a Strength Ring is STR 9 in combat.</p>'+
 '<div class="callout"><p><strong>A working set:</strong> slot 1 STR/AGI for duels and FFA · slot 2 CON parry tank for Horde, Missions and sieges · slot 3 high-AGI dodge build.</p></div>';
}};

PAGES.combat={t:"Combat",e:"The guide",d:"Every turn, against players and NPCs alike, runs on four actions and the arithmetic below. These are the real formulas the bot runs.",h:function(){
 return '<h2 class="s">The three stats</h2>'+
 '<p class="b">Your point budget grows with your level and is never unlimited:</p>'+
 '<span class="fx">total stat points = 10 + (global level − 1)</span>'+
 '<h3 class="t">STR — Strength</h3>'+
 '<p class="b">Raw damage. Each point adds <strong>+4</strong> to your base attack on top of a random 5–15 roll, and it strengthens both halves of your Parry.</p>'+
 '<span class="fx">base damage = (STR × 4) + random(5–15)</span>'+
 '<h3 class="t">AGI — Agility</h3>'+
 '<p class="b">The strongest stat in the game, because it does <strong>four</strong> things at once: it multiplies your damage (Overcrit), sets your crit chance, sets your dodge chance, and removes flat damage from every hit you take.</p>'+
 '<span class="fx">overcrit ≈ 1 + 0.5 × (AGI ÷ 29)   ·   flat reduction = AGI × 2.5</span>'+
 tbl(["AGI","Crit &amp; dodge chance"],[["0","0%"],["5","5%"],["10","10%"],["13","11%"],["16","12%"],["20","13%"],["40","20%"]],["n",""])+
 '<p class="b">Up to AGI 10 each point is +1%. Above 10 it slows to roughly +1% per 3 AGI.</p>'+
 '<h3 class="t">CON — Constitution</h3>'+
 '<span class="fx">max HP = 50 + (CON × 15)   ·   rest heal = 20 + (CON × 3)</span>'+
 tbl(["CON","Max HP","Rest heals"],[["0","50","20"],["5","125","35"],["10","200","50"],["15","275","65"],["20","350","80"]],["n","n","n"])+
 '<h2 class="s">Build calculator</h2>'+
 '<p class="b">Move the numbers. Everything below is computed with the formulas above, not an approximation of them.</p>'+
 '<div class="rig">'+
  '<div class="rig__p">'+
   '<div class="lvl"><span class="lvl__l">Global level</span><div class="lvl__c">'+
   '<button class="btn" id="lvD" aria-label="Lower level">−</button><span class="lvl__v num" id="lvV">20</span>'+
   '<button class="btn" id="lvU" aria-label="Raise level">+</button></div></div>'+
   '<div class="bud"><span class="bud__t">Points spent</span><span class="bud__v num" id="bud">0 / 29</span></div>'+
   '<div id="stats"></div>'+
  '</div>'+
  '<div class="rig__o">'+
   '<div class="ro" id="ro"></div>'+
   '<div class="dm"><div class="dm__h">One attack, against an unarmoured target</div>'+
    '<div class="dm__r"><span class="dm__l">Normal</span><span class="dm__b"><span class="dm__s" id="sN"></span></span><span class="dm__n" id="nN">—</span></div>'+
    '<div class="dm__r"><span class="dm__l">Critical</span><span class="dm__b"><span class="dm__s" id="sC"></span></span><span class="dm__n" id="nC">—</span></div>'+
    '<div class="dm__r"><span class="dm__l">Focus</span><span class="dm__b"><span class="dm__s" id="sF"></span></span><span class="dm__n" id="nF">—</span></div>'+
   '</div><p class="vd" id="vd"></p>'+
  '</div>'+
 '</div>'+
 '<h2 class="s">The four actions</h2>'+
 tbl(["Action","What it does"],[
  ["Attack","Deal damage to your target. Can crit, from AGI."],
  ["Parry","Brace to block and counter the next hit. Not a flat reduction — see below."],
  ["Rest","Heal 20 + CON×3 <em>and</em> gain Focus for your next attack."],
  ["Use Consumable","Use a potion from your bag on your turn."],
  ["Switch","Team and tag modes only: swap your active fighter for a benched one. Uses your turn."]
 ],["k",""])+
 '<h2 class="s">Parry is a wager, not a shield</h2>'+
 '<span class="fx">block value = (CON × 5) + STR   ·   counter value = (CON × 3) + STR</span>'+
 '<p class="b"><strong>Perfect Block</strong> — if your block value is greater than or equal to the incoming attack, you take <strong>zero</strong> damage and reflect your counter value back.</p>'+
 '<p class="b"><strong>Guard Break</strong> — if the attack is bigger than your block value, you break: you take only the <em>overflow</em> above your block, and your AGI flat reduction then applies to that overflow.</p>'+
 '<div class="callout"><p>This is why a high-CON parry punishes attackers, and why a hard enough hitter breaks one anyway. Do not parry a guaranteed guard-breaker — you just eat the difference.</p></div>'+
 '<h2 class="s">Focus and Ultra Focus</h2>'+
 '<p class="b"><strong>Focus</strong> comes from Resting, or a Focus Potion. Your next Attack deals <strong>×2</strong>. It carries turn to turn until you spend it, and it can still be dodged, reduced or parried.</p>'+
 '<p class="b"><strong>Ultra Focus</strong> comes from gaining Focus again while already Focused. Your next attack is a guaranteed ×2 that <strong>cannot be dodged, cannot be reduced by AGI, and cannot be parried.</strong></p>'+
 '<div class="callout"><p>Ultra Focus is the answer to every defensive build in the game. If your opponent is about to parry, or is a high-dodge AGI build, build it and punish them.</p></div>'+
 '<h2 class="s">Crits, dodge and reduction</h2>'+
 '<p class="b">A crit multiplies final damage by <strong>×1.5</strong>. Base crit is 0% with no AGI. A Critical Potion adds +25% to your next attack; clan passives and badges add more. Dodge is passive and takes you to zero damage. Flat reduction applies to every hit that lands — and Ultra Focus ignores it entirely.</p>'+
 '<h2 class="s">NPC passives</h2>'+
 '<p class="b">Most NPCs and every boss carry passives that change how the fight works.</p>'+
 tbl(["Passive","Effect"],NPCPASS.map(function(r){return [r[0],r[1]];}),["k",""])+
 '<h2 class="s">The Stalker</h2>'+
 '<p class="b">A special NPC that challenges you to 1v1 and runs a <strong>predictive AI</strong>. It reads your last several actions, your HP percentage, your stat spread, whether you have Focus, and whether you just rested or parried repeatedly.</p>'+
 '<p class="b">Spam Attack and it parries more. Spam Parry and it waits for the guard break. Low HP on you and it presses; low HP on itself and it gets aggressive.</p>'+
 '<div class="callout callout--warn"><p><strong>Never repeat an action more than twice.</strong> The clan passive Silent Watch cuts your chance of being targeted by the Stalker and the Marked Hunt by up to 25%.</p></div>';
}};

PAGES.consumables={t:"Consumables",e:"The guide",d:"Bought from the Shop panel with Oil Coins, stored in your bag, used on your turn. Prices are set by Max — these are the standard defaults.",h:function(){
 return tbl(["Item","Typical price","Effect"],POTIONS.map(function(r){return [r[0],r[1]?r[1]+" OIL":"—",r[2]];}),["k","n",""])+
 '<div class="callout"><p>The <strong>Guard Potion</strong> is the flat &minus;50% next hit. The <strong>Parry action</strong> is a separate block-and-counter mechanic — they are not the same thing.</p></div>'+
 '<h2 class="s">Tournament restrictions</h2>'+
 '<p class="b">Tournament allows exactly four: <strong>Ultra Health Potion, Protective Shield Potion, Mind Cleanser, Power Potion.</strong> One per round.</p>'+
 '<h2 class="s">How to actually use them</h2>'+
 '<p class="b">Pre-load a <strong>Guard Potion</strong> before a hit you can see coming. Heal at 30–40% HP rather than waiting for critical. Stack a <strong>Focus Potion</strong> right after a Rest to reach Ultra Focus in one turn.</p>'+
 '<p class="b">There is also a <strong>Black Market</strong> with rotating stock, and event panels with their own items.</p>';
}};

PAGES.gear={t:"Gear &amp; Forge",e:"The guide",d:"Crafted gear boosts your stats in every mode. Two gear slots, saved per stat slot, enhanced up to +5.",h:function(){
 var g=GEAR.map(function(r){
  return '<div class="card"><div class="card__h"><span class="card__n">'+E(r[0])+'</span></div>'+
   '<div class="card__st">'+E(r[1])+'</div><div class="card__d">'+E(r[3])+'</div>'+
   '<div class="card__f">'+(r[2]?r[2].toLocaleString()+" OIL · ":"")+E(r[4])+'</div></div>';
 });
 var cf=CLANFORGE.map(function(r){
  return '<div class="card"><div class="card__h"><span class="card__n">'+E(r[0])+'</span><span class="card__tag card__tag--clan">Clan Forge</span></div>'+
   '<div class="card__st">'+E(r[1])+'</div><div class="card__d">'+E(r[3])+'</div>'+
   '<div class="card__f">'+r[2].toLocaleString()+' OIL · clan must unlock the recipe</div></div>';
 });
 return '<h2 class="s">Materials</h2>'+
 '<p class="b">Materials drop from finishing game modes — higher-stakes modes drop more — and from <strong>hunting regions</strong>. Four are your starter stock:</p>'+
 tbl(["Starter material","Common sources"],[
  ["Copper Ore","Duels, training, raids, dungeons"],["Silver Ore","Contracts, missions, raids, dungeons"],
  ["Linen Fiber","Missions, escort, contracts, dungeons"],["Cardboard Scrap","Loot drops, triad, escort, FFA"]
 ],["k",""])+
 '<p class="b">Above those sit uncommon, rare and very rare tiers, plus <strong>10 region signature materials</strong> that only drop from hunting one specific region, and two <strong>legendary</strong> weapon mats — Void-Tempered Core and Ascendant Ember — that no region drops at all.</p>'+
 '<h2 class="s">The catalog</h2>'+
 '<p class="b">Twenty-six pieces. Many carry a real combat passive, not just a stat line.</p>'+cards(g)+
 '<h2 class="s">Clan Forge</h2>'+
 '<p class="b">Six pieces your <strong>clan</strong> must unlock the recipe for before any member can craft them.</p>'+cards(cf)+
 '<h2 class="s">Set bonuses</h2>'+
 '<p class="b">Wearing the right two pieces together upgrades their passives. Eleven pairs are defined.</p>'+
 tbl(["Set","The two pieces","What it changes"],SETS.map(function(r){return [r[0],'<span style="font-family:var(--mono);font-size:.76rem">'+E(r[1])+"</span>",r[2]];}),["k","",""])+
 '<h2 class="s">Enhancement · +1 to +5</h2>'+
 '<p class="b">Equipped gear enhances from +1 to +5, making its bonus stronger each level, and it applies in every combat mode. Cost scales hard: the oil curve runs <strong>20% → 35% → 60% → 100% → 150%</strong> of the item\'s base price per level, about 365% of the item\'s cost in total to reach +5.</p>'+
 '<div class="callout callout--warn"><p><strong>The +4 and +5 wall is deliberate.</strong> Those two steps demand rare materials the earlier ones do not. Take your best piece to +3 before you even think about the last two.</p></div>'+
 '<h2 class="s">Order of operations</h2>'+
 '<span class="fx">stat slot → gear bonuses → enhancement → set bonus → combat</span>'+
 '<p class="b">Everything stacks and applies automatically. <strong>My Stats</strong> shows the number that actually enters the fight.</p>';
}};

PAGES.weapons={t:"Weapons",e:"The guide",d:"A separate equipment slot from gear, with its own catalog, its own materials, and an active skill you fire in combat.",h:function(){
 var w=WEAPONS.map(function(r){
  var tag=r[6]==="clan"?'<span class="card__tag card__tag--clan">Clan Forge</span>':(r[6]==="quest"?'<span class="card__tag">Quest</span>':"");
  return '<div class="card"><div class="card__h"><span class="card__n">'+E(r[0])+'</span>'+tag+'</div>'+
   '<div class="card__st">'+E(r[1])+'</div>'+
   '<div class="card__d"><strong style="font-family:var(--serif);color:var(--text)">'+E(r[2])+'</strong> — '+E(r[3])+'</div>'+
   '<div class="card__f">'+(r[5]?r[5].toLocaleString()+" OIL · ":"")+E(r[4])+(r[7]?" · "+E(r[7]):"")+'</div></div>';
 });
 return '<h2 class="s">How weapons work</h2>'+
 '<p class="b">Every weapon gives a <strong>passive</strong> that is always on, <strong>plus</strong> an <strong>active skill</strong> you fire with the skill button — it appears once you have a weapon equipped. You can only have <strong>one active skill in play per fight</strong>, and each one is <strong>once per combat</strong>.</p>'+
 '<p class="b">Weapons enhance to <strong>+5</strong> like gear, using their own recipes and materials, and every recipe needs a <strong>region signature material</strong> — so every region on the map feeds a particular weapon.</p>'+
 '<div class="callout"><p>Active skills are <strong>disabled in equalized modes</strong> — Blind Drop and Airdrop combat — where everyone fights on identical footing by design.</p></div>'+
 '<h2 class="s">The sixteen</h2>'+cards(w)+
 '<h2 class="s">Matching a weapon to a build</h2>'+
 '<p class="b">Burst skills reward STR/AGI attackers: <strong>Reaper\'s Edge</strong> if you can push targets under 25%, <strong>Gemini Edge</strong> to split damage, <strong>Sunder Pike</strong> against high-AGI targets whose flat mitigation is the problem.</p>'+
 '<p class="b">Sustain and defense suit a CON parry tank: <strong>Aegis Bulwark</strong> for a near-guaranteed parry, <strong>Guardian\'s Oath</strong> to eat the hit aimed at your weakest ally, <strong>Pulse Injector</strong> to parry, heal and gain Focus in one turn.</p>'+
 '<p class="b">In team modes, <strong>War Banner</strong>, <strong>Tracker Bow</strong> and <strong>Bastion Standard</strong> multiply across the whole squad instead of one target.</p>'+
 '<div class="callout"><p><strong>Trainee\'s Edge</strong> comes from the weapon quest <em>The First Blade</em>, where Elric finds a sealed forge-site outside Aldenmoor and the constructs that sealed it. It has no passive and cannot be enhanced — it exists to teach the active-skill flow.</p></div>';
}};

PAGES.modes={t:"Game Modes",e:"The guide",d:"Which modes are live, what they pay and the daily caps are set by Max. The mechanics are not.",h:function(){
 return MODES.map(function(g){
  return '<h2 class="s">'+E(g[0])+"</h2>"+
   '<div class="grid grid--wide">'+g[1].map(function(m){
     return '<div class="card"><div class="card__h"><span class="card__n">'+E(m[0])+'</span></div>'+
      (m[1]?'<div class="card__st">'+m[1].split(" · ").map(function(c){return '<span class="cmd">'+E(c)+"</span>";}).join(" ")+"</div>":"")+
      '<div class="card__d">'+E(m[2])+"</div></div>";
   }).join("")+"</div>";
 }).join("")+
 '<h2 class="s">Events and drops</h2>'+
 '<p class="b">Timed events drop rewards into a channel; you usually claim by clicking. <strong>Loot / Tag / Triad / Escort Drops</strong> are tied to specific modes, some with a <em>Doppel</em> twist. <strong>Blind Drop</strong> hides the reward. <strong>Traitor Drop</strong> adds a betrayal mechanic. <strong>Airdrops</strong> are promo-code drops with atomic first-come claims. The <strong>Roulette</strong> is a 2,000 OIL spin for withdrawable prizes, tokens and chaos gear.</p>'+
 '<h2 class="s">The Marked Hunt</h2>'+
 '<p class="b">A random player gets marked and must face an NPC encounter. It triggers under conditions Max sets.</p>';
}};

PAGES.abyss={t:"The Eternal Abyss",e:"The dungeon",d:"A 1–3 player roguelite, and the deepest single mode in the game. Every run is different.",h:function(){
 return '<h2 class="s">Structure</h2>'+
 '<span class="fx">class pick → rooms → partial heal → choice events → final boss</span>'+
 '<p class="b">Multiple rooms with a partial heal between them, narrative <strong>choice events</strong> with real consequences, and a boss at the end. You collect relics on the way and pick up curses you did not ask for.</p>'+
 '<h2 class="s">Classes</h2>'+
 tbl(["Class","Stat change","Passive"],CLASSES.map(function(r){return [r[0],r[1],r[2]];}),["k","n",""])+
 '<h2 class="s">Relics</h2>'+
 RELICS.map(function(r){return '<h3 class="t">'+E(r[0])+'</h3><p class="b">'+E(r[1])+"</p>";}).join("")+
 '<h2 class="s">Curses</h2>'+
 '<p class="b">Team penalties you accumulate — and the Hexblade\'s entire power source, at <strong>+18% damage per active curse</strong>.</p>'+
 tbl(["Curse","Effect"],CURSES.map(function(r){return [r[0],r[1]];}),["k",""])+
 '<h2 class="s">Pacts and Heat</h2>'+
 '<p class="b">Optional difficulty you turn on <em>before</em> entering, for a bigger reward multiplier. <strong>Heat</strong> is simply how many pacts you took.</p>'+
 tbl(["Pact","What it does","Multiplier"],PACTS.map(function(r){return [r[0],r[1],r[2]];}),["k","","n"])+
 tbl(["Heat","Total reward multiplier"],[["1","×1.4"],["2","—"],["3","—"],["4","—"],["5","×4.0 · <em>Abyss Legend</em>"]],["n",""])+
 '<h2 class="s">What lives down there</h2>'+
 tbl(["Enemy","What makes it a problem"],ABYSSFOES.map(function(r){return [r[0],r[1]];}),["k",""])+
 '<div class="callout"><p><strong>The run-winning combo:</strong> Hexblade plus <em>The Black Crown</em> turns every curse into a buff. Bring <em>Soul Bond</em> on Death Pact runs. Save Focus for Specters — normal hits do nothing to them.</p></div>';
}};

PAGES.clans={t:"Clans",e:"The guide",d:"Permanent groups that grant collective passive bonuses, hold territory, and unlock their own forge recipes.",h:function(){
 return '<h2 class="s">Founding one</h2>'+
 tbl(["Rule","Value"],[["Creation cost","12,500 Oil Coins"],["Max members","15"],["Re-join cooldown after leaving","72 hours"],["Invite expiry","72 hours"],["Active passives at once","2 of 9"],["Upgrade levels per passive","5"]],["k","n"])+
 '<div class="callout"><p><strong>Join a clan before you found one.</strong> Enjoy the passives for a while before you spend 12,500 OIL finding out which two you actually want.</p></div>'+
 '<h2 class="s">Roles</h2>'+
 tbl(["Role","Permissions"],[["Owner","Full control — passives, invites and kicks, treasury"],["Sub Leader","Invite, manage daily missions"],["Member","Participate and benefit from passives"]],["k",""])+
 '<h2 class="s">The nine passives</h2>'+
 '<p class="b">Only <strong>two are active at once</strong>. Each has 5 upgrade levels paid from the clan treasury; the values below are at level 5.</p>'+
 tbl(["Passive","At level 5","Best for"],CLANPASS.map(function(r){return [r[0],r[1],r[2]];}),["k","",""])+
 '<div class="callout"><p><strong>Oathbound Link</strong> only fires with <strong>3+ members of the same clan on the same team</strong>. It is worthless unless you coordinate who queues together.</p></div>'+
 '<h2 class="s">Treasury, missions and forge</h2>'+
 '<p class="b">Your clan has shared <strong>daily objectives</strong> — win X of a mode, earn X Oil collectively — that pay the treasury in Oil and members in XP. The treasury funds passive upgrades and <strong>Clan Forge</strong> recipe unlocks, which gate six gear pieces and two weapons behind the clan rather than the player.</p>'+
 '<p class="b">Clans also hold <strong>territory</strong>, which grants passive combat bonuses inside the zones they control.</p>';
}};

PAGES.factions={t:"Factions",e:"The world",d:"The powers of Valestia, as the Codex records them. Ranked by how much of the board each one actually occupies.",h:function(){
 return '<p class="b">Every enemy, ally and artifact you meet is filed under a faction in your <strong>Codex</strong>. The counts below are live — they are how many cards each power currently holds, which is a fair measure of how much of Valestia belongs to it.</p>'+
 '<div class="grid grid--wide">'+FACTIONS.map(function(f){
  return '<div class="card"><div class="card__h"><span class="card__n">'+E(f[0])+'</span>'+
   (f[1]?'<span class="card__tag">'+f[1]+' cards</span>':'<span class="card__tag card__tag--clan">no cards yet</span>')+'</div>'+
   '<div class="card__st">'+E(f[2])+'</div><div class="card__d">'+E(f[3])+"</div></div>";
 }).join("")+"</div>"+
 '<h2 class="s">Reputation and contracts</h2>'+
 '<p class="b">Separate from the Codex, a handful of guilds track your <strong>reputation</strong> and issue <strong>contracts</strong>. Completing one grants Oil, XP and standing, and may cost you standing with a rival. Contracts have minimum reputation requirements, and some need a Guild Contract item to start.</p>'+
 '<p class="b">Three are in real use right now: the <strong>Guardians of the Order</strong>, the <strong>Merchants Guild</strong> and the <strong>Bandits Guild</strong>. Check where you stand with <span class="cmd">!guilds</span>.</p>'+
 '<div class="callout"><p>The <strong>Guardians of the Order</strong> are the order your own title comes from. Gorim called you one of the Guardians before you had done a single thing to earn it.</p></div>';
}};

PAGES.economy={t:"Economy &amp; Progression",e:"The guide",d:"Two currencies, a card collection, achievements that pay, and seasons that take nothing away from you.",h:function(){
 return '<h2 class="s">Currencies</h2>'+
 '<div class="grid">'+
 '<div class="card"><div class="card__h"><span class="card__n">Oil Coins</span><span class="card__tag">OIL</span></div><div class="card__d">The main currency. Earned from most modes, daily message activity, and events. Spent on potions, crafting, enhancement, the roulette, founding a clan (12,500) and clan upgrades.</div></div>'+
 '<div class="card"><div class="card__h"><span class="card__n">War Oil</span></div><div class="card__d">Secondary currency from large-scale combat — Castle Siege and War. Used for siege and war progression.</div></div>'+
 '</div>'+
 '<h2 class="s">Codex</h2>'+
 '<p class="b">A collection of cards you unlock as you play — enemies, gear, regions, allies and artifacts. Each has a discovery tier and a deeper <strong>tactical note</strong> you only unlock by fighting the thing enough. It is both a reference and a completion goal, and it pays XP and Oil as you fill it.</p>'+
 '<h2 class="s">Badges</h2>'+
 '<p class="b">Achievements for hitting milestones — crit counts, wins, and other tracked stats. Some grant small combat bonuses such as crit or dodge chance.</p>'+
 '<h2 class="s">Seasons and medals</h2>'+
 '<p class="b">When a season changes, the server takes a <strong>snapshot</strong> and awards medals for the level milestones you crossed.</p>'+
 tbl(["Level reached","Medal"],[["10","Bronze"],["20","Silver"],["30","Gold"],["40","Diamond"]],["n","k"])+
 '<div class="callout"><p><strong>A season change does not reset your character.</strong> Nothing is wiped, nothing is taken. It records where you finished and rewards the milestones you crossed. View a season card with <span class="cmd">!profile @user s1</span>.</p></div>'+
 '<h2 class="s">Bonds</h2>'+
 '<p class="b">Bonds track <strong>relationships between players</strong>. Playing with — or against — the same people builds a shared history. Check yours with <span class="cmd">!bonds</span>, notable ones with <span class="cmd">!bonds_top</span>, and the log with <span class="cmd">!bonds_history</span>.</p>';
}};

PAGES.pets={t:"The Pets System",e:"Pets",d:"Catch wild animals across Valestia, raise them to level 50 through two evolutions, and fight 3-versus-3. A whole monster-battler living inside the RPG, sharing none of its combat rules.",h:function(){
 return '<div class="callout callout--warn"><p><strong>Pets is in testing.</strong> The module is finished and wired into the bot, but it is locked to Max while it gets shaken out. You can see the Kiosk button; you cannot play it yet. Everything in these pages is what will go live.</p></div>'+
 '<h2 class="s">A different game</h2>'+
 '<p class="b">Pets shares <strong>nothing</strong> with normal combat. No STR/AGI/CON, no Focus, no Parry, no gear. A Pet has <strong>four stats</strong>, a <strong>type</strong>, up to <strong>four moves</strong> with limited uses, and it faints. You fight <strong>3 versus 3</strong>.</p>'+
 '<p class="b">You catch them wild in the regions of Valestia. Each region breeds its own type: <strong>84 species</strong> across <strong>28 animal families</strong>, every family a three-stage evolution line.</p>'+
 tbl(["Rule","Value"],[
  ["Level cap","50"],["Evolutions","At level 16 and again at 36"],["Party size","3"],
  ["Moves per Pet","4 — learning a 5th means forgetting one"],["Genes per Pet","4 (HP / ATK / DEF / SPD), each 0–15"],
  ["Safari runs","5 per day"],["Training duels","3 per day"],["Sparring","Unlimited"]
 ],["k","n"])+
 '<h2 class="s">The loop</h2>'+
 '<p class="b"><strong>1 — Pick a starter.</strong> <strong>Cinderling</strong> (Fire), <strong>Pebblecrab</strong> (Water) or <strong>Leafkit</strong> (Grass). The classic trio, and the classic triangle — each beats one of the others.</p>'+
 '<p class="b"><strong>2 — Travel, then Safari.</strong> Safari draws from the region you are physically standing in, so <span class="cmd">!travel</span> is part of the Pets loop. Want an Ice Pet? Go to Rocky Chill Pass. There is no other way.</p>'+
 '<p class="b"><strong>3 — Chip, status, catch.</strong> Never throw a collar at a healthy Pet. See <a href="#catching">Catching</a>.</p>'+
 '<p class="b"><strong>4 — Battle to level.</strong> Training duels pay XP to both trainers and OIL to the winner. Evolution is automatic.</p>'+
 '<p class="b"><strong>5 — Release your rejects</strong> for Gene Essence, and spend it improving the keepers. See <a href="#genes">Genes &amp; Essence</a>.</p>'+
 '<h2 class="s">Playing it</h2>'+
 tbl(["Command","What it does"],[
  ['<span class="cmd">!safari</span>',"Go looking for wild Pets in the region you are standing in. <strong>5 per day.</strong>"],
  ['<span class="cmd">!pets</span>',"Your collection."],
  ['<span class="cmd">!pet_party</span>',"Set the three that fight."],
  ['<span class="cmd">!pet_name</span>',"Nickname a Pet."],
  ['<span class="cmd">!pet_train @user</span>',"A training duel. Both trainers earn XP. <strong>3 per day.</strong>"],
  ['<span class="cmd">!pet_spar @user</span>',"A friendly fight. No XP, no limit, no cost."],
  ['<span class="cmd">!collars</span> · <span class="cmd">!pet_shop</span>',"Buy collars, potions, revives and ethers."],
  ['<span class="cmd">!petpanel</span>',"The button hub for all of it."]
 ],["k",""])+
 '<p class="b">A Safari encounter runs on a <strong>2 minute turn timer</strong>. Wild Pets use a simple AI that picks its best damage; trainer battles run a smarter one that reads matchups.</p>'+
 '<h2 class="s">The shop</h2>'+
 tbl(["Item","Price","Max held","Effect"],PET_SUPPLIES.map(function(s){
  return [s[0],s[1].toLocaleString()+" OIL",s[2],s[3]];
 }),["k","n","n",""])+
 '<p class="b">The hold caps are the real constraint. Ten collars of each kind, three revives, two Max Ethers — you cannot stockpile your way out of a bad Safari run.</p>'+
 '<h2 class="s">Levelling and evolution</h2>'+
 '<span class="fx">XP to reach the next level = 15 + (current level × 10)</span>'+
 '<p class="b">A linear curve, so the grind never becomes a wall — level 49 to 50 costs 505 XP, not tens of thousands. Battle XP is <span class="cmd">10 + (average foe level × 3)</span>, and the winning trainer also takes <strong>OIL worth double the XP</strong>, which makes Pets a real income stream and not just a side toy.</p>'+
 '<p class="b">Evolution happens automatically at <strong>16</strong> and <strong>36</strong> — no stones, no trades. Each stage jumps the base block: <strong>46% → 72% → 100%</strong>. Watch it happen in the <a href="#lab">Pet Lab</a>.</p>'+
 '<div class="callout"><p>Levelling past an evolution keeps teaching moves, and if all four slots are full the new move goes to a <strong>pending queue</strong> rather than being lost. You choose later, in the open. A forgotten move can be bought back at the <strong>Move Reminder</strong> for <strong>2,000 OIL</strong>.</p></div>';
}};

PAGES.lab={t:"Pet Lab",e:"Pets",d:"Every species, every level, every gene roll. The same formulas the bot runs — pick a Pet apart before you spend a collar on it.",h:function(){
 return '<div class="lab">'+
  '<div class="lab__ctl">'+
   '<div class="lab__f"><label class="lab__l" for="labSp">Species</label>'+
    '<select class="lab__sel" id="labSp"></select></div>'+
   '<div class="lab__f"><label class="lab__l" for="labLv">Level <b class="num" id="labLvV">50</b></label>'+
    '<input class="lab__rng" type="range" id="labLv" min="1" max="50" value="50"></div>'+
   '<div class="lab__genes" id="labGenes"></div>'+
   '<div class="lab__btns">'+
    '<button class="lab__b" id="labPerfect">Perfect 15s</button>'+
    '<button class="lab__b" id="labRoll">Random roll</button>'+
    '<button class="lab__b" id="labZero">All zeros</button>'+
   '</div>'+
   '<p class="lab__q" id="labQ"></p>'+
  '</div>'+
  '<div class="lab__out">'+
   '<div class="lab__id" id="labId"></div>'+
   '<div class="ro" id="labStats"></div>'+
   '<div class="lab__chain" id="labChain"></div>'+
   '<h3 class="t" style="margin-top:1.4rem">Moves known at this level</h3>'+
   '<div class="lab__moves" id="labMoves"></div>'+
   '<p class="lab__note" id="labNote"></p>'+
  '</div>'+
 '</div>'+
 '<h2 class="s">How to read it</h2>'+
 '<p class="b">The stat bars compare this Pet against the <strong>strongest final-stage Pet in the game</strong> for that stat, so a full bar means nothing else beats it. The grey ghost behind each bar is the same Pet with <strong>zero genes</strong> — the gap is what your roll is worth.</p>'+
 '<p class="b">Drag the level past <strong>16</strong> and <strong>36</strong> and the Pet evolves in front of you, base stats and all. That is exactly what happens in a battle.</p>'+
 '<div class="callout"><p>Moves are the <strong>last four learned at or below</strong> the current level — the same rule the bot uses. Raise the level and watch an early move fall off the list.</p></div>';
}};

PAGES.species={t:"Species &amp; Evolution",e:"Pets",d:"84 species, 28 families, nine regions. Every family is one animal with three stages, and every region breeds one type.",h:function(){
 var names={starter_ruins:"Starter Ruins",crimson_plain:"Crimson Plain",stormbay_docks:"Stormbay Docks",
  rocky_chill_pass:"Rocky Chill Pass",black_lotus_wood:"Black Lotus Wood",ravencraft:"Ravencraft",
  mist_forest:"The Mist Forest",bandit_caves:"Bandit Caves",dark_knight_sanctum:"Dark Knight's Sanctum"};
 var fams=PET_FAMS.map(function(r){
  var emo={fire:"🔥",water:"💧",grass:"🌿",ice:"❄️",rock:"🪨",flying:"🦅",ghost:"👻",dark:"🌑"}[r[1]];
  return '<div class="card"><div class="card__h"><span class="card__n">'+E(names[r[0]])+'</span>'+
   '<span class="card__tag">'+emo+" "+E(r[1])+'</span></div>'+
   r[2].map(function(f){
    return '<p class="sp" style="margin-top:.5rem"><span class="sp__a">'+f[0]+" "+E(f[1])+
     ' · final base '+f[3].join("/")+'</span><span class="sp__n">'+E(f[2])+"</span></p>";
   }).join("")+"</div>";
 });
 return '<p class="b">Each family is <strong>one animal with three stages</strong>. Below is every family, its role, and the <strong>final stage</strong>\'s base stats as <span class="cmd">HP/ATK/DEF/SPD</span> — the numbers that define what the line is for. The earlier two stages are the same shape scaled down, at <strong>46%</strong> and <strong>72%</strong> of the final block.</p>'+
 '<p class="b">Pull any of them apart at any level in the <a href="#lab">Pet Lab</a>.</p>'+
 '<div class="grid grid--wide">'+fams.join("")+"</div>"+
 '<div class="callout"><p><strong>Merchant Crossroads has no native species.</strong> Its encounters are drawn from Starter Ruins, Crimson Plain and Stormbay Docks — it is a crossroads in the literal sense.</p></div>'+
 '<h2 class="s">Roles</h2>'+
 '<p class="b">Every family is built to one of six shapes. The count is how many species carry it.</p>'+
 tbl(["Role","Species","What it is for"],PET_ROLES.map(function(r){return [r[0],r[1],r[2]];}),["k","n",""])+
 '<div class="callout"><p><strong>Speed decides fights.</strong> Sweepers hit 133–138 base speed and win the turn. Walls sit at 35–55 and simply never go first — a wall only works if it survives the alpha strike, and against a super-effective STAB hit it will not.</p></div>';
}};

PAGES.genes={t:"Genes &amp; Essence",e:"Pets",d:"Four hidden numbers rolled the moment you catch a Pet, and the only currency that can move them.",h:function(){
 return '<h2 class="s">What a gene is</h2>'+
 '<p class="b">Every Pet rolls <strong>four genes</strong> at the moment you catch it — one per stat, each a hidden <strong>0 to 15</strong>. They are permanent, they never change with level, and they are the difference between two Pets of the same species being identical or one being clearly better.</p>'+
 '<span class="fx">max HP = floor(base_hp × level ÷ 50) + level + 10 + gene</span>'+
 '<span class="fx">atk / def / spd = floor(base × level ÷ 50) + 5 + gene</span>'+
 '<p class="b">At level 50 a gene is worth a flat <strong>+15</strong>. That is enormous on a stat that lands around 60 — a perfect-gene Pet is roughly <strong>25% stronger</strong> than a zero-gene one of the same species. This is the entire reason to keep hunting a species you already own.</p>'+
 '<p class="b">See the gap for yourself in the <a href="#lab">Pet Lab</a>: set a Pet to level 50 and slide the genes from 0 to 15.</p>'+
 tbl(["Gene value","Quality"],[["0–4","Poor"],["5–8","Average"],["9–11","Good"],["12–13","Excellent"],["14–15","Exceptional"]],["n","k"])+
 '<div class="callout"><p>Genes are <strong>hidden until you scan them</strong>. A wild Pet looks identical whether it rolled 2s or 15s — the scan is how you find out before you spend a collar.</p></div>'+
 '<h2 class="s">Gene Essence</h2>'+
 '<p class="b">A separate currency, and it has exactly one source: <strong>releasing a Pet</strong>. The better its genes, the more it pays. You cannot release your last Pet.</p>'+
 tbl(["Sum of the 4 genes","Quality","Essence paid"],[
  ["0–19","Poor","1"],["20–31","Average","2"],["32–43","Good","3"],["44–52","Excellent","4"],["53–60","Exceptional","5"]
 ],["n","k","n"])+
 '<h2 class="s">What you can spend it on</h2>'+
 tbl(["Operation","Cost","What it does"],PET_GENE_OPS.map(function(o){return [o[0],o[1]+" essence",o[2]];}),["k","n",""])+
 '<div class="callout callout--warn"><p><strong>The economy is deliberately brutal.</strong> A Poor Pet pays 1 essence. Gene Training costs 20 and is capped at 5 per Pet, ever. So perfecting one Pet by hand means releasing <em>twenty</em> bad ones — and it still only buys 5 points out of a possible 60.</p>'+
 '<p>Catching a good roll will always beat grinding a bad one into shape. That is the point: the Safari is the game, not the workbench.</p></div>'+
 '<h2 class="s">Advice</h2>'+
 '<p class="b"><strong>Scan before you throw.</strong> 10 essence is cheap next to a 3,000 OIL Prime Collar spent on a Poor roll.</p>'+
 '<p class="b"><strong>Release your rejects.</strong> A Poor Pet sitting in your box is 1 essence you have not banked.</p>'+
 '<p class="b"><strong>Spend Training on the stat that matters</strong>, not evenly. A sweeper wants SPD; a wall wants HP and DEF. Five points into the right stat beats five spread thin.</p>';
}};

PAGES.petbattle={t:"Pet Battles",e:"Pets",d:"Eight types, 61 moves, five status conditions, and multipliers that stack hard enough to end a fight in one hit.",h:function(){
 return '<h2 class="s">The type chart</h2>'+
 '<p class="b">Eight types. Super effective is <strong>×2</strong>, resisted is <strong>×½</strong>, and there is no immunity — everything can hurt everything.</p>'+
 tbl(["Type","×2 against","Resisted by"],PET_CHART.map(function(c){
  return [c[1]+" "+c[0].charAt(0).toUpperCase()+c[0].slice(1),c[2],c[3]];
 }),["k","",""])+
 '<div class="callout"><p><strong>Rock is the anomaly:</strong> it hits Fire, Flying and Ice for ×2 and <em>nothing resists it</em>. It is also the only type two regions breed — Starter Ruins and Bandit Caves. If you are building one team to fight everything, start there.</p>'+
 '<p><strong>Ghost and Dark are a closed loop:</strong> Ghost only beats Ghost, Dark only beats Ghost, and Dark resists both. A Dark Pet walks through the Mist Forest unopposed.</p></div>'+
 '<h2 class="s">Damage</h2>'+
 '<p class="b">A hit starts from the move\'s power, your Pet\'s attack and the target\'s defence, and is then multiplied:</p>'+
 tbl(["Multiplier","Value","When"],[
  ["STAB","×1.5","The move's type matches the Pet's type"],
  ["Super effective","×2","See the chart above"],
  ["Resisted","×0.5","See the chart above"],
  ["Critical","×1.5","6% chance, every hit"]
 ],["k","n",""])+
 '<p class="b">Pet battles are <strong>short and decisive</strong> by design — every turn is a message in a channel, so fights are tuned to end rather than grind. A super-effective STAB finisher can knock out a frail same-level foe in one hit and a bulky one in two. Type matchups decide fights outright instead of shaving percentages.</p>'+
 '<div class="callout"><p>Stack them and it compounds fast: <strong>STAB × super effective × crit = ×4.5</strong>. Bringing the right type is worth more than bringing the better Pet.</p></div>'+
 '<h2 class="s">Moves</h2>'+
 '<p class="b"><strong>61 moves</strong> — 49 that deal damage and 12 that do not. Every move has limited <strong>PP</strong>, and when a Pet runs out of everything it is reduced to <strong>Struggle</strong> (40 power, typeless). Moves carry <strong>priority</strong>: a priority move goes first regardless of speed, which is how a slow Pet steals a kill.</p>'+
 '<p class="b">A Pet holds <strong>four</strong>, and they are the last four it learned. Browse any species\' full learnset in the <a href="#lab">Pet Lab</a>.</p>'+
 '<h3 class="t">Status conditions</h3>'+
 tbl(["Status","Effect"],PET_STATUS.map(function(s){return [s[1]+" "+s[0],s[2]];}),["k",""])+
 '<p class="b">Status is not just chip damage — it is <strong>how you catch things</strong>. See <a href="#catching">Catching</a>.</p>'+
 '<h2 class="s">Building a team</h2>'+
 '<p class="b"><strong>Build for coverage, not for power.</strong> Three Pets, three types that cover each other. A team of three Fire Pets loses to one Water wall.</p>'+
 '<p class="b"><strong>Rock is the safest first investment</strong> — nothing resists it, and it comes out of the beginner region.</p>'+
 '<p class="b"><strong>Bring one answer to speed.</strong> A priority move, or a Pet fast enough to trade with a sweeper. Otherwise the first hit is always theirs.</p>';
}};

PAGES.catching={t:"Catching",e:"Pets",d:"The Safari, the collars, and the formula that decides whether the thing you just fought is yours.",h:function(){
 return '<h2 class="s">The Safari</h2>'+
 '<p class="b"><span class="cmd">!safari</span> looks for wild Pets in the region you are <strong>physically standing in</strong>. Five runs a day. Each region breeds one type, so where you stand decides what you meet — travel is part of the loop.</p>'+
 '<h2 class="s">The formula</h2>'+
 '<p class="b">The classic one, and every term in it is something you control:</p>'+
 '<span class="fx">chance = ((3·maxHP − 2·currentHP) × catch_rate × collar × status) ÷ (3·maxHP × 255)</span>'+
 tbl(["What you do","Multiplier"],[
  ["Basic Collar","×1.0"],["Fine Collar","×1.5"],["Prime Collar","×2.5"],
  ["Asleep or frozen","×2.0"],["Burned, poisoned or paralysed","×1.5"]
 ],["k","n"])+
 tbl(["Wild Pet","Catch rate","Meaning"],[
  ["Stage 1","200","Easy"],["Stage 2","120","Awkward"],["Stage 3","60","Hard"],
  ["Anything in Dark Knight's Sanctum","× 0.5","Half. The endgame region is deliberately miserable."]
 ],["k","n",""])+
 '<div class="callout"><p><strong>The play is always the same:</strong> chip it to a sliver, put it to sleep or freeze it (×2), then throw a Prime Collar (×2.5). That is <strong>×5</strong> on top of a nearly-empty HP bar. Throwing collars at a healthy Pet is how you run out of collars.</p>'+
 '<p>The floor is <strong>3%</strong> — nothing is ever truly impossible. The ceiling is 100%.</p></div>'+
 '<h2 class="s">Collars</h2>'+
 tbl(["Collar","Price","Max held","Multiplier"],[
  ["Basic Collar","1,000 OIL","10","×1.0"],["Fine Collar","1,800 OIL","10","×1.5"],["Prime Collar","3,000 OIL","10","×2.5"]
 ],["k","n","n","n"])+
 '<p class="b">Ten of each, maximum. A Prime Collar costs three times a Basic and buys you two and a half times the odds — worth it on a stage-3 target, wasteful on a stage-1.</p>'+
 '<div class="callout"><p><strong>Scan first.</strong> 10 Gene Essence tells you whether the Pet in front of you is worth a 3,000 OIL collar at all. Most are not.</p></div>';
}};

PAGES.valestia={t:"Valestia",e:"The world",d:"Ten huntable regions, the roads between them, and the places the story happens. Select any marker on the map.",h:function(){
 return '<div class="atlas"><div class="atlas__m" id="map"></div>'+
 '<aside class="atlas__s"><div class="dos" id="dos"></div></aside></div>'+
 '<div class="leg">'+
 '<span><b style="background:var(--verdigris)"></b>Huntable region</span>'+
 '<span><b style="background:transparent;border:2px solid var(--verdigris)"></b>Story location</span>'+
 '<span><b style="background:transparent;border:2px dashed var(--corrupt)"></b>Seal site</span>'+
 '<span><b style="background:var(--brass)"></b>Selected</span>'+
 '</div>'+
 '<h2 class="s">Travel and hunt</h2>'+
 '<p class="b"><span class="cmd">!travel</span> moves you between regions. <span class="cmd">!hunt</span> farms the region you are standing in for <strong>Oil, XP and that region\'s signature material</strong>. Each region has its own roster and its own drop table.</p>'+
 '<p class="b">There are <strong>210 named enemies</strong> across ten regions — 3 species × 7 tiers each. Their stats are <strong>generated from level</strong>, so a hunted enemy always matches you; the tier name is just flavour for the band you are in. Max may cap hunts per day.</p>'+
 '<div class="callout"><p>Hunting the right region is how you farm the exact material your next piece needs, instead of grinding random modes and hoping. Every weapon recipe needs a signature material.</p></div>'+
 '<h2 class="s">Signature materials</h2>'+
 tbl(["Region","Signature material"],Object.keys(PLACES).filter(function(k){return PLACES[k].m;}).map(function(k){return [PLACES[k].n,PLACES[k].m];}),["k","n"])+
 '<h2 class="s">Region upgrades and taxes</h2>'+
 '<p class="b">Regions can be <strong>upgraded</strong> for bonuses and may charge entry <strong>taxes</strong>. Both are set by Max on the server the bot lives in.</p>'+
 '<h2 class="s">Large-scale war</h2>'+
 '<p class="b">Three systems sit on top of the map, and they all feed each other.</p>'+
 '<h3 class="t">Corruption and liberation battles</h3>'+
 '<p class="b">A region can fall <strong>Corrupted</strong>, and it is the closest thing the world has to losing ground. When it happens:</p>'+
 '<div class="tw"><table><tbody>'+
 '<tr><td class="k">Drops</td><td>Turn off completely. No materials, no signature material, nothing.</td></tr>'+
 '<tr><td class="k">Enemies</td><td>Gain a <strong>Corrupted</strong> tag and a hard stat increase — roughly +35% and +30% on their numbers.</td></tr>'+
 '<tr><td class="k">Upgrades</td><td>Freeze. Whatever the region had built up stops progressing.</td></tr>'+
 '</tbody></table></div>'+
 '<p class="b">The only way back is a <strong>liberation battle</strong> — a staged <strong>Vanguard PvE</strong> campaign fought in sequence with <span class="cmd">!liberate</span>. You do not win it in one fight: you clear the stages, and winning the last one lifts the corruption, turns the drops back on and unfreezes everything the region had.</p>'+
 '<div class="callout callout--warn"><p>A corrupted region is dead economy. If the one you farm goes dark, the signature material you need goes with it — and no other region drops it. Liberating it is not optional content, it is how you get your supply line back.</p></div>'+
 '<h3 class="t">Castle Siege</h3>'+
 '<p class="b">An 8-zone, 3-lane castle fought in phases — announced, preparation, combat window, result. Hold zones to keep enemies away from the Throne Room, with <strong>Intercept, Supply, Rescue</strong> and <strong>Sabotage</strong> objectives. Pays War Oil and XP.</p>'+
 '<div class="callout"><p><strong>Hold the Main Gate.</strong> It feeds the centre and connects all three lanes. Everything else is negotiable.</p></div>'+
 '<h3 class="t">War</h3>'+
 '<p class="b">Multi-team control of 5 sectors: North, Center (the most contested), South, Vanguard and Rearguard. Winning a sector pays Oil, War Oil, XP and materials — and buys you an edge in the next one, so the sectors are not independent.</p>'+
 '<h3 class="t">Territory</h3>'+
 '<p class="b">The persistent layer underneath all of it. Clans and players <strong>hold</strong> zones and get passive combat bonuses inside them — extra parry, dodge, mitigation, post-crit damage. It does not reset between events; it is simply who owns what right now.</p>';
}};

PAGES.lore={t:"Lore",e:"The world",d:"What the scroll says, what is under Aldenmoor, and what is happening to the water in Stormbay harbour.",h:function(){
 return '<h2 class="s">Azroth</h2>'+
 '<p class="b">A malign being, sealed. The seal is <strong>failing</strong>. The three locations named in the scroll all connect to the original seal, and the seal needs <strong>three pieces</strong> to be repaired — one in each place.</p>'+
 '<h2 class="s">The Scroll</h2>'+
 '<p class="b">Written in a dead script and co-authored by <strong>Gorim</strong> and the <strong>Varn family</strong>. It describes the road to three places: <strong>Aldenmoor</strong> (ruins, north-west), <strong>Veldran</strong> (a city in the mountains) and <strong>Mirefall</strong> (a swamp). Elric spent thirty years on the script before he ever met you.</p>'+
 '<h2 class="s">The Seal and the Varns</h2>'+
 '<p class="b">The Varns <strong>built the mechanism</strong>. Maren Varn — the last of them, hidden for thirty years — had the key, and gave it to you. The old maps of the tunnels have <strong>intentional errors</strong>: the original builders did not trust outsiders.</p>'+
 '<h2 class="s">The dark circle</h2>'+
 '<div class="ex"><p class="ex__h">What the Harbor Knows</p>'+
 '<p>Thirty feet across. The water inside it is completely still. Absolutely nobody on the docks looks at it.</p></div>'+
 '<p class="b">It appeared in Stormbay harbour, and then again at the cove where the Grey Maren made landfall. It is Azroth, leaking through.</p>'+
 '<h2 class="s">The Hollow</h2>'+
 '<p class="b">Creatures born from Azroth\'s seepage into Aldenmoor. Distorted humanoid shapes with <strong>no eyes</strong>, that dissolve into smoke when they die. They come up from the old underground entrances. They were the first thing in this story that was not human.</p>'+
 '<h2 class="s">The Archive</h2>'+
 '<p class="b">Below Aldenmoor there is something older than Aldenmoor. The refugees dug a granary foundation and found a shaft; three workers went down and one came back wrong.</p>'+
 '<div class="grid grid--wide">'+CODEX.map(function(c){
  return '<div class="card"><div class="card__h"><span class="card__n">'+E(c[0])+'</span><span class="card__tag">'+E(c[1])+'</span></div>'+
   '<div class="card__st">'+E(c[2])+'</div><div class="card__d">'+E(c[3])+"</div></div>";
 }).join("")+"</div>"+
 '<h2 class="s">The cast</h2>'+
 '<div class="grid grid--wide">'+[
  ["The Guardian","You","Chosen by prophecy — Gorim\'s word, not yours. You carry the scroll and Maren\'s key."],
  ["Jessie","“Two Irons” · Mercenary","Hard on the outside, deliberately: she keeps the reputation and the distance as armour. Underneath she is loyal and kind and almost never shows it. Found as a baby in the Greywood; she has never known who her parents were. She goes quiet when anyone says Veldran."],
  ["Elric","The Scribe · Scholar","Shy, quiet, very smart. Reads dead languages. Wants to belong with the group and feels like an academic among people of action. When he does speak he is usually right."],
  ["Cara","Broker","Pawnshop on the South Docks, crossbow always loaded, knows everything and everyone. She and Jessie have a history neither of them will explain. She stayed in Stormbay."],
  ["Valdris","The antagonist","Buys loyalties. Reached Stormbay four days ahead of you and has never once been behind since. He issued arrest warrants through the city\'s own legal channels, which tells you what he owns."],
  ["Gorim the Old","Keeper of the Scroll","Guarded it for years and co-wrote it. He knew who you were before you did. He has not appeared in person since."],
  ["Maren Varn","The last Varn","Thirty years hidden. Gave you the key. Described a couple who went to Aldenmoor thirty years ago: <em>she had hands like a fighter and eyes that didn\'t trust easily; he talked too much.</em>"],
  ["Garrick","Leader of the Aldenmoor refugees","Strong, charismatic, gives everything for his people, still optimistic despite the losses. He lost his brother on the second failed attempt to reach the underground stores."],
  ["The Frogst Brothers","Barrel and Hammer","Korn Army, but they came for you personally the night of the escape. Jessie faced both of them alone."]
 ].map(function(c){
  return '<div class="card"><div class="card__h"><span class="card__n">'+E(c[0])+'</span></div>'+
   '<div class="card__st">'+E(c[1])+'</div><div class="card__d">'+c[2]+"</div></div>";
 }).join("")+"</div>"+
 '<h2 class="s">Open threads</h2>'+
 '<p class="b"><strong>Who were Jessie\'s parents?</strong> They were looking for the same thing and walked the same road you are walking. That is all anyone knows. Elric found two names in the Ravennor archive and would not read them out.</p>'+
 '<p class="b"><strong>What does Valdris actually want?</strong> The scroll, obviously. Whether he wants to repair the seal or break it has never been said.</p>'+
 '<p class="b"><strong>Veldran.</strong> Second location. Jessie has a connection to it that she has not explained to anybody.</p>'+
 '<p class="b"><strong>Cara.</strong> She stayed. Jessie believes she is fine, and needs to.</p>'+
 '<p class="b"><strong>Gorim.</strong> Still gone.</p>';
}};

PAGES.story={t:"The Main Story",e:"Campaign",d:"A co-op story campaign that runs inside the combat engine. Thirty-one missions across three chapters, and it is still going.",h:function(){
 function beats(rows,liveId){
  return rows.map(function(r){
   var live=(r[0]===liveId);
   return '<div class="bt'+(live?" live":"")+'"><span class="bt__i">'+E(r[0])+'</span><div><span class="bt__n">'+E(r[1])+(live?" — latest":"")+'</span>'+
    (r[2]?'<div class="bt__d">'+E(r[2])+"</div>":"")+"</div></div>";
  }).join("");
 }
 return '<p class="b">Each mission is a real fight with story beats woven through it. They run in order — every one requires the one before it — and most of Chapter One is playable with a partner.</p>'+
 '<div class="chap"><div class="chap__h"><h2>Chapter One</h2><span class="chap__id">14 missions</span><span class="chap__st">Complete</span></div>'+
 '<p class="chap__w">Stormbay</p>'+beats(CH1)+"</div>"+
 '<div class="ex"><p class="ex__h">The Grey Maren — the last image of Chapter One</p>'+
 '<p>Jessie cuts the rope. You jump. The boat pulls away from Pier 7 and the last thing you see of her is her back, two pistols out, facing Barrel and Hammer Frogst at the same time.</p></div>'+
 '<div class="chap"><div class="chap__h"><h2>Chapter Two</h2><span class="chap__id">12 missions</span><span class="chap__st">Complete</span></div>'+
 '<p class="chap__w">The coast road · Ravennor · Aldenmoor</p>'+beats(CH2)+"</div>"+
 '<div class="ex"><p class="ex__h">She\'ll Find You</p>'+
 '<p>Cornered, with Elric behind you and more of them coming, you finally open the note Cara left you.</p>'+
 '<p><em>"She\'ll find you. She always finds what she\'s looking for. — C"</em></p>'+
 '<p>Jessie takes the flank apart on her own. Half of them go down before the rest run. She says one thing.</p>'+
 '<p><em>"Took you long enough to open that."</em></p></div>'+
 '<div class="chap"><div class="chap__h"><h2>Chapter Three</h2><span class="chap__id">5 missions so far</span><span class="chap__st live">In progress</span></div>'+
 '<p class="chap__w">Ironhollow · the pass</p>'+beats(CH3,"31")+"</div>"+
 '<div class="ex"><p class="ex__h">The Road Climbs — the current front of the story</p>'+
 '<p>Davan finds them before they pack. He has a folded piece of paper in his hand, old, edges soft from being kept somewhere for a long time. <em>"A friend of mine worked the pass eight years ago. He drew the approach from memory when he came back. The narrow stretch, where the ice sits longest, where the wind comes from."</em></p>'+
 '<p>He holds it out to Jessie. <em>"It is not much."</em></p>'+
 '<p>Jessie takes it and folds it once more and puts it in her coat pocket, not her pack. <em>"It is exactly enough."</em></p></div>'+
 '<h2 class="s">Where it is going</h2>'+
 '<p class="b">The scroll named three places. <strong>Aldenmoor</strong> is done and its seal piece is accounted for. <strong>Veldran</strong> is in the mountains, past the pass the team is climbing now, and Jessie has never explained why the name stops her. <strong>Mirefall</strong> is a swamp in the south-east and nobody has said one word about it yet.</p>';
}};

PAGES.sides={t:"Side Stories",e:"Campaign",d:"Fifty more missions across ten arcs, separate from the main line. Most run 3-player; each arc is a chain you play in order.",h:function(){
 var arcs=SIDES.map(function(a){
  return '<div class="arc"><div class="arc__h"><h3>'+E(a[0])+'</h3><span class="arc__c">'+a[2]+' missions</span><span class="arc__p">up to '+a[3]+' player'+(a[3]>1?"s":"")+'</span></div>'+
   '<div class="arc__b"><p class="arc__d">'+E(a[4])+'</p><div class="arc__l">'+
   a[5].map(function(q,i){return '<div class="arc__q"><i>'+(i+1)+'</i><span>'+E(q)+"</span></div>";}).join("")+
   "</div></div></div>";
 }).join("");
 return '<p class="b">Side stories are their own chains — each one requires the previous mission in its arc, and none of them require the main story except <strong>Millhaven</strong>, which opens once you have met Jessie.</p>'+
 arcs+
 '<h2 class="s">Encounters</h2>'+
 '<p class="b">One-off fights rather than chains. Each comes in an <strong>Easy</strong> and a <strong>Hard</strong> version, so you can run them well below the recommended level if you bring the right team.</p>'+
 '<div class="grid grid--wide">'+ENCOUNTERS.map(function(e){
  return '<div class="card"><div class="card__h"><span class="card__n">'+E(e[0])+'</span><span class="card__tag">'+e[1]+'P</span></div>'+
   '<div class="card__d">'+E(e[2])+'</div><div class="card__f">'+E(e[3])+"</div></div>";
 }).join("")+"</div>"+
 '<h2 class="s">The weapon quest</h2>'+
 '<div class="arc"><div class="arc__h"><h3>The First Blade</h3><span class="arc__c">1 mission</span><span class="arc__p">solo</span></div>'+
 '<div class="arc__b"><p class="arc__d">Elric the Scribe found a sealed forge-site outside Aldenmoor. He also found the constructs that sealed it. He told you plainly that he cannot fight — but he does think you are brave enough to pass their trial.</p>'+
 '<p class="b" style="margin:0"><strong>Reward:</strong> Trainee\'s Edge, the starter weapon. The Aldenmoor Weaponsmiths\' Guild had one rule before they taught anything else: <em>one strike, placed correctly, at the moment that matters.</em></p></div></div>';
}};

 Object.keys(PAGES).forEach(function(k){
